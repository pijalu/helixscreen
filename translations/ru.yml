  'Uneven belt tension causes print artifacts like layer shifts, ': 'Неравномерное натяжение ремня вызывает дефекты печати, такие как сдвиги слоёв, '
  ? "Uneven belt tension causes print artifacts like layer shifts, VFAs (vertical fine artifacts), and ringing. This tool vibrates each belt path and measures the resonant frequency — matched frequencies mean balanced tension. For CoreXY, Path A and B should be within a few Hz of each other."
  : 'Неравномерное натяжение ремня вызывает дефекты печати: сдвиги слоёв, VFA (вертикальные мелкие артефакты) и звон. Этот инструмент вибрирует каждый путь ремня и измеряет резонансную частоту — совпадающие частоты означают сбалансированное натяжение. Для CoreXY Путь A и B должны быть в пределах нескольких Гц друг от друга.'
